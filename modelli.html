<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Modelli – Spizzicotecnica & SPI System</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#F07020;--or2:#FF9448;
  --glow:rgba(240,112,32,.30);--glow2:rgba(240,112,32,.14);
  --dk:#0A0A0A;--dk2:#111111;
  --lt:#F5F3EF;--lt2:#EAE7E0;--lt3:#DEDAD0;
  --tx:#141414;--txm:#6B6B6B;--wh:#fff;
  --r14:14px;--r20:20px;
  --ease:.38s cubic-bezier(.4,0,.2,1);
  --spring:.52s cubic-bezier(.34,1.56,.64,1);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--lt);color:var(--tx);line-height:1.7;overflow-x:hidden}
img{pointer-events:none;user-select:none;-webkit-user-drag:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--dk)}
::-webkit-scrollbar-thumb{background:var(--or);border-radius:3px}

/* ── TOP BAR ── */
.bar{
  position:fixed;top:0;left:0;width:100%;height:68px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;
  background:rgba(8,8,8,.92);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-bottom:1px solid rgba(240,112,32,.12);
  box-shadow:0 2px 20px rgba(0,0,0,.45);
  z-index:9000;
  transition:height .4s ease;
}
.bar-brand{display:flex;align-items:center;gap:13px;text-decoration:none}
.bar-logo{height:44px;width:auto;transition:filter .3s}
.bar-logo:hover{filter:drop-shadow(0 0 10px rgba(240,112,32,.45))}
.bar-name{
  font-family:'Cormorant Garamond',serif;
  display:flex;flex-direction:column;align-items:center;
  line-height:1.0;color:var(--wh);
}
.bar-name b{font-size:.9em;font-weight:700;text-transform:uppercase;letter-spacing:3px;display:block}
.bar-name s{font-size:.75em;font-weight:600;color:var(--or);display:block;text-decoration:none;line-height:1.3}
.back{
  display:inline-flex;align-items:center;gap:8px;
  color:rgba(255,255,255,.55);text-decoration:none;
  font-size:.78em;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  padding:10px 4px;min-height:44px;white-space:nowrap;
  border:1px solid rgba(255,255,255,.08);border-radius:50px;
  padding:9px 18px;
  background:rgba(255,255,255,.04);
  transition:all .3s ease;
}
.back:hover{color:var(--or);border-color:rgba(240,112,32,.3);background:rgba(240,112,32,.07)}
.back i{font-size:12px}

/* ── PAGE HERO ── */
.pg-hero{
  padding-top:68px;background:var(--dk);
  text-align:center;position:relative;overflow:hidden;
}
.pg-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 75% 60% at 50% 115%,rgba(240,112,32,.18) 0%,transparent 68%);
  pointer-events:none;
}
.pg-hero::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--or),var(--or2),var(--or),transparent);
}
.pg-hero-in{position:relative;z-index:1;padding:52px 22px 48px}
.pg-pill{
  font-size:.62em;font-weight:700;letter-spacing:5px;text-transform:uppercase;
  color:var(--or);background:rgba(240,112,32,.08);border:1px solid rgba(240,112,32,.22);
  border-radius:40px;padding:7px 18px;display:inline-block;margin-bottom:18px;
}
.pg-hero h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2em,5vw,3.2em);font-weight:300;color:var(--wh);line-height:1.12;
  letter-spacing:-.3px;
}
.pg-hero h1 em{font-style:italic;color:var(--or2);font-weight:300}
.pg-hero h1 strong{font-weight:700;display:block}
.pg-line{width:44px;height:2px;background:linear-gradient(90deg,var(--or),var(--or2));border-radius:2px;margin:20px auto 0}

/* ── WRAPPER ── */
.wrap{max-width:960px;margin:0 auto;padding:54px 20px 90px}

/* ── CARDS ── */
.grid{display:flex;flex-direction:column;gap:22px}

@keyframes cardIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

.card{
  background:var(--wh);border-radius:var(--r20);overflow:hidden;
  display:grid;grid-template-columns:190px 1fr;
  box-shadow:0 4px 24px rgba(0,0,0,.06);
  border:1px solid var(--lt2);
  position:relative;
  animation:cardIn .46s ease both;
  transition:transform var(--spring),box-shadow var(--ease),border-color var(--ease);
}
.card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--or),var(--or2));
  transform:scaleY(0);transform-origin:top;transition:transform var(--ease);
}
.card:hover{transform:translateY(-5px) scale(1.005);box-shadow:0 22px 52px rgba(0,0,0,.10);border-color:rgba(240,112,32,.15)}
.card:hover::before{transform:scaleY(1)}

.card-img{
  background:var(--lt);display:flex;align-items:center;justify-content:center;
  padding:24px 18px;border-right:1px solid var(--lt2);min-height:175px;
  transition:background var(--ease);
}
.card:hover .card-img{background:rgba(240,112,32,.04)}
.card-img img{
  max-width:148px;max-height:148px;width:100%;height:auto;
  object-fit:contain;border-radius:8px;
  transition:transform .44s ease;
}
.card:hover .card-img img{transform:scale(1.08)}

.card-body{padding:28px 26px;display:flex;flex-direction:column;gap:8px}
.card-body h2{
  font-family:'Cormorant Garamond',serif;
  font-size:1.38em;font-weight:700;color:var(--tx);line-height:1.2;
}
.card-body p{font-size:.91em;color:var(--txm);line-height:1.75;flex:1}
.pdf-btn{
  display:inline-flex;align-items:center;gap:8px;
  margin-top:10px;padding:11px 24px;border-radius:50px;
  background:linear-gradient(135deg,var(--or),var(--or2));
  color:#fff;text-decoration:none;font-weight:700;font-size:.78em;
  letter-spacing:.8px;text-transform:uppercase;
  box-shadow:0 5px 16px var(--glow2);
  transition:transform var(--spring),box-shadow var(--ease);
  align-self:flex-start;min-height:42px;cursor:pointer;
  position:relative;overflow:hidden;
}
.pdf-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
  opacity:0;transition:opacity .3s;
}
.pdf-btn:hover,.pdf-btn:active{transform:translateY(-2px) scale(1.05);box-shadow:0 10px 28px var(--glow)}
.pdf-btn:hover::after{opacity:1}

/* ── BACK TO TOP ── */
#btt{
  position:fixed;bottom:20px;right:20px;
  width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--or),var(--or2));
  color:#fff;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 5px 18px var(--glow);z-index:7000;
  opacity:0;transform:translateY(16px) scale(.85);
  transition:opacity .3s ease,transform .3s ease;pointer-events:none;
}
#btt.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
#btt:hover,#btt:active{transform:translateY(-3px) scale(1.1)!important}

/* ── FOOTER ── */
footer{
  background:var(--dk2);color:rgba(255,255,255,.35);
  text-align:center;padding:36px 22px;font-size:.82em;
  border-top:1px solid rgba(240,112,32,.12);position:relative;
}
footer::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(240,112,32,.35),transparent);
}
footer p{margin-bottom:7px}
footer a{color:rgba(255,255,255,.48);text-decoration:none;transition:color .22s}
footer a:hover{color:var(--or)}

/* ── MOBILE ── */
@media(max-width:620px){
  .card{grid-template-columns:1fr}
  .card-img{border-right:none;border-bottom:1px solid var(--lt2);min-height:160px;padding:22px}
  .card-body{padding:20px 22px}
  .bar{padding:0 16px}
  .bar-name b{font-size:.74em;letter-spacing:1.5px}
  .bar-name s{font-size:.64em}
  .bar-logo{height:38px}
  .back .back-txt{display:none}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
  #intro{display:none}
}
  </style>
</head>
