<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:      #F07020;
      --orange-lt:   #FF9448;
      --orange-glow: rgba(240,112,32,0.30);
      --dark:        #0D0D0D;
      --light:       #F5F3EF;
      --light-2:     #EDEAE4;
      --text:        #1C1C1C;
      --text-muted:  #6B6B6B;
      --white:       #FFFFFF;
      --radius-md:   16px;
      --radius-lg:   26px;
      --transition:  0.35s cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--light);
      color: var(--text);
      line-height: 1.7;
    }

    img { pointer-events: none; user-select: none; -webkit-user-drag: none; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 10px; }

    /* ===== TOP BAR ===== */
    .top-bar {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 68px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(240,112,32,0.15);
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
      z-index: 9999;
    }

    .top-bar-left {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none; color: white;
    }

    .top-bar-logo { height: 44px; width: auto; }

    .top-bar-text {
      font-family: 'Cormorant Garamond', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      line-height: 1.05;
      color: white;
      letter-spacing: 1.5px;
    }
    /* BIGGER brand text */
    .top-bar-text .word {
      display: block;
      font-size: 1.0em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2.5px;
    }
    .top-bar-text .amp {
      display: block;
      font-size: 0.85em;
      color: var(--orange);
      font-weight: 600;
      line-height: 1.2;
    }

    .back-home {
      display: inline-flex; align-items: center; gap: 8px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.85em; font-weight: 600;
      letter-spacing: 0.5px;
      transition: color var(--transition);
      white-space: nowrap;
    }
    .back-home:hover { color: var(--orange); }

    /* ===== PAGE HERO ===== */
    .page-hero {
      padding-top: 68px;
      background: var(--dark);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .page-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 110%, rgba(240,112,32,0.20) 0%, transparent 70%);
      pointer-events: none;
    }
    .page-hero-inner {
      position: relative; z-index: 1;
      padding: 52px 24px 48px;
    }
    .page-hero-eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.7em; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      color: var(--orange);
      background: rgba(240,112,32,0.1);
      border: 1px solid rgba(240,112,32,0.25);
      border-radius: 40px; padding: 6px 18px;
      display: inline-block; margin-bottom: 18px;
    }
    .page-hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2em, 5vw, 3.4em);
      font-weight: 700; color: var(--white); line-height: 1.15;
    }
    .page-hero h1 em { font-style: normal; color: var(--orange-lt); }
    .page-hero-stripe {
      width: 56px; height: 3px;
      background: linear-gradient(90deg, var(--orange), var(--orange-lt));
      border-radius: 2px; margin: 20px auto 0;
    }

    /* ===== PAGE WRAPPER ===== */
    .page-wrapper {
      max-width: 940px;
      margin: 0 auto;
      padding: 52px 20px 80px;
    }

    /* ===== MODEL CARDS ===== */
    .models-grid {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* Entrance animation for cards */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .model {
      background: var(--white);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: grid;
      grid-template-columns: 210px 1fr;
      box-shadow: 0 6px 28px rgba(0,0,0,0.07);
      border: 1px solid var(--light-2);
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      position: relative;
      animation: cardIn 0.5s ease both;
    }

    .model::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0; width: 4px;
      background: linear-gradient(180deg, var(--orange), var(--orange-lt));
      border-radius: 4px 0 0 4px;
      transform: scaleY(0); transform-origin: top;
      transition: transform var(--transition);
    }
    .model:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.11);
      border-color: rgba(240,112,32,0.18);
    }
    .model:hover::before { transform: scaleY(1); }

    .model-img-col {
      background: var(--light);
      display: flex; align-items: center; justify-content: center;
      padding: 24px 20px;
      border-right: 1px solid var(--light-2);
      min-height: 180px;
    }
    .model-img-col img {
      max-width: 150px; max-height: 150px;
      width: 100%; height: auto;
      object-fit: contain;
      border-radius: 10px;
      transition: transform 0.4s ease;
    }
    .model:hover .model-img-col img { transform: scale(1.07); }

    .model-content {
      padding: 28px 26px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .model-content h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35em; font-weight: 700;
      color: var(--text); line-height: 1.25;
    }
    .model-content p {
      font-size: 0.93em; color: var(--text-muted); line-height: 1.7; flex: 1;
    }
    .pdf-link {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 8px; padding: 11px 24px;
      border-radius: 40px;
      background: linear-gradient(135deg, var(--orange) 0%, var(--orange-lt) 100%);
      color: white; text-decoration: none;
      font-weight: 700; font-size: 0.85em;
      font-family: 'Space Grotesk', sans-serif;
      box-shadow: 0 5px 18px var(--orange-glow);
      transition: all var(--transition);
      align-self: flex-start;
    }
    .pdf-link:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 10px 28px var(--orange-glow); }

    /* ===== BACK TO TOP ===== */
    #back-to-top {
      position: fixed; bottom: 22px; right: 22px;
      width: 50px; height: 50px;
      background: linear-gradient(135deg, var(--orange), var(--orange-lt));
      color: white; border: none; border-radius: 50%;
      cursor: pointer; display: flex; justify-content: center; align-items: center;
      font-size: 18px; box-shadow: 0 6px 20px var(--orange-glow);
      z-index: 8000; opacity: 0; transform: translateY(20px) scale(0.8);
      transition: opacity 0.35s ease, transform 0.35s ease; pointer-events: none;
    }
    #back-to-top.visible { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    #back-to-top:hover { transform: translateY(-4px) scale(1.1) !important; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .model { grid-template-columns: 1fr; }
      .model-img-col {
        border-right: none;
        border-bottom: 1px solid var(--light-2);
        min-height: 160px; padding: 20px;
      }
      .model-content { padding: 20px; }
      .top-bar { padding: 0 16px; }
      .top-bar-text .word { font-size: 0.72em; letter-spacing: 1px; }
      .top-bar-text .amp  { font-size: 0.65em; }
      .back-home span { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>

      '</div>';

    container.appendChild(card);
  });
}
</script>
