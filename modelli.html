  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
  font-family: 'Poppins', sans-serif;

  background: linear-gradient(135deg,#f8f9fb,#ffffff);

  color: #222;

  line-height: 1.7;

  margin: 0;

  padding: 0;
}

/* TOP BAR */
.top-bar {
  position: fixed;
  top: 0;
  left: 0;

  width: 100%;
  height: 65px;

  background: rgba(15,15,15,0.92);
  backdrop-filter: blur(18px);

  display: flex;
  align-items: center;

  padding: 0 30px;

  z-index: 9999;

  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

.top-bar img {
  height: 42px;
  cursor: pointer;
  transition: transform .3s ease;
}

.top-bar img:hover {
  transform: scale(1.08);
}

.page-wrapper {
  padding-top: 100px;
}
    .models-grid {
  display: flex;
  flex-direction: column;
  align-items: center;   /* 👈 centra le card */
  width: 100%;
}

/* Card modelli più armoniosa quando è centrata */
.model {
  width: 100%;
  max-width: 800px; /* 👈 non troppo largo su desktop */
}

/* HEADER */
header h1 {
  font-size: 2.6em;

  text-transform: uppercase;

  letter-spacing: 2px;

  color: #ff6f3c;

  margin-bottom: 40px;
}

/* CARD MODELLI */
.model {
  background: rgba(255,255,255,0.9);

  border-radius: 18px;

  padding: 30px;

  margin-bottom: 30px;

  box-shadow:
    0 15px 40px rgba(0,0,0,0.06);

  border-left: 6px solid #ff6f3c;

  transition: all .35s ease;
}

.model:hover {
  transform: translateY(-8px);

  box-shadow:
    0 25px 60px rgba(0,0,0,0.12);
}

.model h2 {
  font-size: 1.6em;

  color: #ff6f3c;

  text-transform: uppercase;

  letter-spacing: 1px;
}

.model img {
  max-width: 190px;

  border-radius: 14px;

  box-shadow: 0 8px 25px rgba(0,0,0,0.12);

  transition: transform .4s ease;
}

.model:hover img {
  transform: scale(1.05);
}
    .model-content {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}
    .model p {
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

.pdf-link {
  display: inline-block;

  margin-top: 15px;

  padding: 12px 28px;

  border-radius: 40px;

  background: linear-gradient(135deg,#ff7a18,#ffb347);

  color: white;

  text-decoration: none;

  font-weight: 700;

  box-shadow: 0 6px 20px rgba(255,122,24,0.4);

  transition: all .3s ease;
}

.pdf-link:hover {
  transform: translateY(-3px) scale(1.05);
}

    if (!dati) {
      container.innerHTML = `<p>Prodotto non trovato o non selezionato.</p>`;
    } else {
      const header = document.createElement("h2");
      header.textContent = dati.titolo;
      container.parentElement.insertBefore(header, container);

      dati.modelli.forEach(modello => {
        const div = document.createElement("div");
        div.className = "model";

        div.innerHTML = `
          <h2>${modello.nome}</h2>
          <div class="model-content">
            <img src="${modello.immagine}" alt="${modello.nome}" />
            <p>${modello.descrizione}</p>
