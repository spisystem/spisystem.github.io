<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Modelli – Spizzicotecnica & SPI System</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#F07020;--or2:#FF9448;--glow:rgba(240,112,32,.30);
  --dk:#0D0D0D;--lt:#F6F4F0;--lt2:#EDEAE3;
  --tx:#1A1A1A;--txm:#6A6A6A;--wh:#fff;
  --r16:16px;--r26:26px;
  --ease:.36s cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--lt);color:var(--tx);line-height:1.7}
img{pointer-events:none;user-select:none;-webkit-user-drag:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--dk)}
::-webkit-scrollbar-thumb{background:var(--or);border-radius:4px}

/* TOP BAR */
.bar{
  position:fixed;top:0;left:0;width:100%;height:68px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 26px;
  background:rgba(10,10,10,.93);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border-bottom:1px solid rgba(240,112,32,.16);
  box-shadow:0 2px 18px rgba(0,0,0,.38);z-index:9000;
}
.bar-brand{display:flex;align-items:center;gap:12px;text-decoration:none}
.bar-logo{height:44px;width:auto}
.bar-name{
  font-family:'Cormorant Garamond',serif;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;line-height:1.05;color:var(--wh);letter-spacing:2px;
}
.bar-name b{font-size:.92em;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;display:block}
.bar-name s{font-size:.78em;font-weight:600;color:var(--or);display:block;text-decoration:none;line-height:1.2}
.back{
  display:inline-flex;align-items:center;gap:8px;
  color:rgba(255,255,255,.65);text-decoration:none;
  font-size:.84em;font-weight:600;letter-spacing:.5px;
  transition:color var(--ease);white-space:nowrap;
  /* bigger tap target */
  padding:10px 4px;min-height:44px;
}
.back:hover{color:var(--or)}

/* PAGE HERO */
.pg-hero{
  padding-top:68px;background:var(--dk);
  text-align:center;position:relative;overflow:hidden;
}
.pg-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 65% at 50% 115%,rgba(240,112,32,.22) 0%,transparent 70%);
  pointer-events:none;
}
.pg-hero-in{position:relative;z-index:1;padding:52px 22px 46px}
.pg-pill{
  font-size:.66em;font-weight:700;letter-spacing:4px;text-transform:uppercase;
  color:var(--or);background:rgba(240,112,32,.1);border:1px solid rgba(240,112,32,.24);
  border-radius:40px;padding:6px 17px;display:inline-block;margin-bottom:16px;
}
.pg-hero h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2em,5vw,3.4em);font-weight:700;color:var(--wh);line-height:1.15;
}
.pg-hero h1 em{font-style:normal;color:var(--or2)}
.pg-line{width:52px;height:3px;background:linear-gradient(90deg,var(--or),var(--or2));border-radius:2px;margin:18px auto 0}

/* WRAPPER */
.wrap{max-width:940px;margin:0 auto;padding:50px 18px 80px}

/* MODEL CARDS */
.grid{display:flex;flex-direction:column;gap:26px}

@keyframes cardIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.card{
  background:var(--wh);border-radius:var(--r26);overflow:hidden;
  display:grid;grid-template-columns:200px 1fr;
  box-shadow:0 5px 26px rgba(0,0,0,.07);
  border:1px solid var(--lt2);
  position:relative;
  animation:cardIn .48s ease both;
  transition:transform var(--ease),box-shadow var(--ease),border-color var(--ease);
}
.card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,var(--or),var(--or2));
  border-radius:4px 0 0 4px;
  transform:scaleY(0);transform-origin:top;transition:transform var(--ease);
}
.card:hover{transform:translateY(-5px);box-shadow:0 20px 50px rgba(0,0,0,.10);border-color:rgba(240,112,32,.17)}
.card:hover::before{transform:scaleY(1)}

.card-img{
  background:var(--lt);display:flex;align-items:center;justify-content:center;
  padding:22px 18px;border-right:1px solid var(--lt2);min-height:170px;
}
.card-img img{
  max-width:148px;max-height:148px;width:100%;height:auto;
  object-fit:contain;border-radius:9px;
  transition:transform .42s ease;
}
.card:hover .card-img img{transform:scale(1.07)}

.card-body{padding:26px 24px;display:flex;flex-direction:column;gap:9px}
.card-body h2{
  font-family:'Cormorant Garamond',serif;
  font-size:1.38em;font-weight:700;color:var(--tx);line-height:1.22;
}
.card-body p{font-size:.92em;color:var(--txm);line-height:1.72;flex:1}
.pdf-btn{
  display:inline-flex;align-items:center;gap:7px;
  margin-top:8px;padding:11px 22px;border-radius:40px;
  background:linear-gradient(135deg,var(--or),var(--or2));
  color:#fff;text-decoration:none;font-weight:700;font-size:.83em;
  box-shadow:0 5px 16px var(--glow);
  transition:transform var(--ease),box-shadow var(--ease);
  align-self:flex-start;
  /* easy tap */
  min-height:44px;cursor:pointer;
}
.pdf-btn:hover,.pdf-btn:active{transform:translateY(-2px) scale(1.04);box-shadow:0 10px 26px var(--glow)}

/* BACK TO TOP */
#btt{
  position:fixed;bottom:20px;right:20px;
  width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--or),var(--or2));
  color:#fff;font-size:17px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 5px 18px var(--glow);z-index:7000;
  opacity:0;transform:translateY(16px) scale(.85);
  transition:opacity .3s ease,transform .3s ease;pointer-events:none;
}
#btt.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
#btt:hover,#btt:active{transform:translateY(-3px) scale(1.1)!important}

/* MOBILE */
@media(max-width:620px){
  .card{grid-template-columns:1fr}
  .card-img{border-right:none;border-bottom:1px solid var(--lt2);min-height:150px;padding:20px}
  .card-body{padding:20px}
  .bar{padding:0 14px}
  .bar-name b{font-size:.74em;letter-spacing:1.5px}
  .bar-name s{font-size:.64em}
  .bar-logo{height:38px}
  .back .back-txt{display:none}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="bar">
  <a href="index.html" class="bar-brand">
    <img src="img/B0F190C1-ED18-45F3-B492-572A76ED7803.png" class="bar-logo" alt="Logo" width="44" height="44" loading="eager" decoding="async" fetchpriority="high" onerror="this.style.display='none'">
    <div class="bar-name">
      <b>Spizzicotecnica</b>
      <s>&</s>
      <b>SPI System</b>
    </div>
  </a>
  <a href="index.html" class="back">
    <i class="fas fa-arrow-left"></i> <span class="back-txt">Torna al sito</span>
  </a>
</div>

<!-- PAGE HERO -->
<div class="pg-hero">
  <div class="pg-hero-in">
    <div class="pg-pill">Catalogo prodotti</div>
    <h1 id="pgTitle">Modelli <em>disponibili</em></h1>
    <div class="pg-line"></div>
  </div>
</div>

<!-- MODELS -->
<div class="wrap">
  <div class="grid" id="grid">
    <p style="text-align:center;color:#999;padding:48px 0">Caricamento…</p>
  </div>
</div>

<!-- BACK TO TOP -->
<button id="btt" aria-label="Torna in cima"><i class="fas fa-chevron-up"></i></button>

<script>

var btt=document.getElementById('btt');
window.addEventListener('scroll',function(){btt.classList.toggle('show',window.scrollY>180)},{passive:true});
btt.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'})});

    t:'Registratori di Cassa',
    m:[
      {n:'SERIE HELIOS PLUS RT',i:'img/helios.jpeg',d:'Alte prestazioni di affidabilità, doppio display LCD grande e luminoso, cambio carta facilitato con dispositivo Easy loading super-fast. Ideale per tutte le attività di vendita.',p:'pdf/helios.pdf'},

      {n:'Sun Eco Color',i:'img/sunecol.jpg',d:'Acciaio inox con gestione immagini a colori dei prodotti e funzione pubblicità lato cliente per un display sempre aggiornato.',p:'pdf/sunecol.pdf'},

      {n:'Sun Eco Color Volo',i:'img/sunecolvol.jpg',d:'Versione Volo con piatto ribaltabile. Acciaio inox, gestione immagini a colori e funzione pubblicità lato cliente.',p:'pdf/sunecolvol.pdf'},

  'affettatrici':{

    m:[

  'kiosk':{

  'palmari-stampanti':{
    t:'Palmari & Stampanti Cucina',

};

var key=new URLSearchParams(window.location.search).get('prodotto');
var cat=db[key];
var grid=document.getElementById('grid');
var pgTitle=document.getElementById('pgTitle');

grid.innerHTML='';

if(!cat){
  grid.innerHTML='<p style="text-align:center;color:#999;padding:60px 0;font-size:1.05em">Prodotto non trovato. <a href="index.html" style="color:#F07020">Torna al sito</a></p>';
}else{
  pgTitle.innerHTML=cat.t+' <em>disponibili</em>';
  document.title=cat.t+' – Spizzicotecnica & SPI System';

  cat.m.forEach(function(m,i){
    var el=document.createElement('div');
    el.className='card';
    el.style.animationDelay=(i*70)+'ms';

    var pdf=m.p
      ?'<a href="'+m.p+'" class="pdf-btn" target="_blank" rel="noopener"><i class="fas fa-file-pdf"></i> Scarica brochure</a>'
      :'';

    el.innerHTML=
      '<div class="card-img"><img src="'+m.i+'" alt="'+m.n+'" loading="lazy"></div>'+
      '<div class="card-body"><h2>'+m.n+'</h2><p>'+m.d+'</p>'+pdf+'</div>';

    grid.appendChild(el);
  });
}
</script>
</body>
</html>
